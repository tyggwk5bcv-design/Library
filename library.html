<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Моя библиотека</title>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Библиотека">
<meta name="theme-color" content="#1a1a1a">
<link rel="apple-touch-icon" href="./icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --ink-mid: #555;
    --ink-soft: #999;
    --paper: #f7f5f0;
    --paper-warm: #efecea;
    --rule: #ddd9d3;
    --accent: #5c6bc0;       /* приглушённый индиго */
    --accent-soft: #e8eaf6;
    --read: #4caf7d;
    --reading: #e8a44a;
    --want: #aaa;
    --film-accent: #c0715c;  /* терракота для фильмов */
    --film-soft: #f6ece8;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--rule);
    padding: 28px 32px 20px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'Literata', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
  }
  .stats {
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .stat-item { display: flex; align-items: center; gap: 5px; }
  .stat-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--rule);
    padding: 0 32px;
    gap: 0;
  }
  .tab {
    padding: 12px 20px 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    letter-spacing: 0.2px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active-books { color: var(--accent); border-bottom-color: var(--accent); }
  .tab.active-films { color: var(--film-accent); border-bottom-color: var(--film-accent); }

  /* ── CONTROLS ── */
  .controls {
    padding: 14px 32px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-warm);
  }

  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }

  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink-mid);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--ink-mid); color: var(--ink); }

  .chip.on-books { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .chip.on-films { background: var(--film-soft); border-color: var(--film-accent); color: var(--film-accent); }

  .divider { width: 1px; height: 24px; background: var(--rule); margin: 0 4px; }

  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 260px; margin-left: auto; }
  .search-wrap input {
    width: 100%;
    padding: 6px 10px 6px 30px;
    border: 1px solid var(--rule);
    border-radius: 20px;
    font-size: 12px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    font-family: 'Inter', sans-serif;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-soft); font-size: 12px; pointer-events: none;
  }

  /* ── ADD BUTTON ── */
  .btn-add {
    padding: 6px 16px;
    border-radius: 20px;
    border: none;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-add-books { background: var(--accent); color: #fff; }
  .btn-add-films { background: var(--film-accent); color: #fff; }

  /* ── SORT ── */
  .sort-select {
    padding: 5px 10px;
    border: 1px solid var(--rule);
    border-radius: 20px;
    font-size: 12px;
    background: var(--paper);
    color: var(--ink-mid);
    outline: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  /* ── LIST ── */
  .list-wrap { padding: 0 32px 40px; }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--ink-soft);
    padding: 20px 0 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 2px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--rule);
    transition: background 0.1s;
    cursor: default;
  }
  .item:hover { background: var(--paper-warm); }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .status-dot:hover { transform: scale(1.4); }
  .status-read { background: var(--read); }
  .status-reading { background: var(--reading); }
  .status-want { background: var(--want); border: 1.5px solid var(--rule); background: transparent; }

  .item-title {
    font-family: 'Literata', serif;
    font-size: 15px;
    font-weight: 400;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-title.done { text-decoration: line-through; color: var(--ink-soft); }

  .item-meta {
    font-size: 11px;
    color: var(--ink-soft);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .item-genre {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .genre-books { background: var(--accent-soft); color: var(--accent); }
  .genre-films { background: var(--film-soft); color: var(--film-accent); }

  .item-fav {
    font-size: 14px;
    cursor: pointer;
    color: var(--rule);
    flex-shrink: 0;
    transition: color 0.15s;
    background: none;
    border: none;
    padding: 2px;
    line-height: 1;
  }
  .item-fav:hover { color: #e91e63; }
  .item-fav.on { color: #e91e63; }

  .item-del {
    font-size: 16px;
    cursor: pointer;
    color: var(--rule);
    flex-shrink: 0;
    background: none;
    border: none;
    padding: 2px;
    transition: color 0.15s;
    line-height: 1;
    display: none;
  }
  .item:hover .item-del { display: block; }
  .item-del:hover { color: #c0392b; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: var(--paper);
    border-radius: 12px;
    padding: 28px 28px 24px;
    width: 100%; max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal h2 {
    font-family: 'Literata', serif;
    font-size: 18px;
    font-weight: 400;
    margin-bottom: 18px;
  }
  .modal label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-soft);
    margin-bottom: 5px;
    margin-top: 14px;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    font-size: 14px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    font-family: 'Inter', sans-serif;
    appearance: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex; gap: 10px; margin-top: 22px; justify-content: flex-end;
  }
  .btn-cancel {
    padding: 8px 18px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: none;
    color: var(--ink-mid);
    cursor: pointer;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
  }
  .btn-save {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
  }
  .btn-save-books { background: var(--accent); }
  .btn-save-films { background: var(--film-accent); }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-soft);
    font-family: 'Literata', serif;
    font-style: italic;
    font-size: 15px;
  }

  /* ── FOOTER ACTIONS ── */
  .footer-actions {
    padding: 0 32px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-io {
    padding: 5px 14px;
    border: 1px solid var(--rule);
    border-radius: 20px;
    background: none;
    color: var(--ink-soft);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-io:hover { color: var(--ink); border-color: var(--ink-mid); }
  .btn-myshows { border-color: var(--film-accent); color: var(--film-accent); }
  .btn-myshows:hover { background: var(--film-soft); }
  .btn-myshows:disabled { opacity: 0.5; cursor: default; }

  /* tooltip hint on status dot */
  .status-wrap { position: relative; }
  .status-wrap .tip {
    display: none;
    position: absolute;
    left: 14px; top: -2px;
    background: var(--ink);
    color: #fff;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }
  .status-wrap:hover .tip { display: block; }

  @media (max-width: 600px) {
    header, .controls, .list-wrap, .footer-actions, .tabs { padding-left: 16px; padding-right: 16px; }
    .item-genre { display: none; }
    .search-wrap { min-width: 120px; }
    .divider { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Моя библиотека</h1>
  <div class="stats" id="stats"></div>
</header>

<div class="tabs">
  <button class="tab" id="tab-books" onclick="switchTab('books')">Книги</button>
  <button class="tab" id="tab-films" onclick="switchTab('films')">Фильмы / Сериалы</button>
  <button class="tab" id="tab-all" onclick="switchTab('all')">Всё</button>
  <button class="tab" id="tab-fav" onclick="switchTab('fav')">♥ Любимые</button>
</div>

<div class="controls">
  <div class="filter-group" id="status-filters">
    <button class="chip" data-filter="all" onclick="setStatusFilter('all')">Все</button>
    <button class="chip" data-filter="reading" onclick="setStatusFilter('reading')">⚡ Читаю/Смотрю</button>
    <button class="chip" data-filter="read" onclick="setStatusFilter('read')">✓ Прочитано/Просмотрено</button>
    <button class="chip" data-filter="want" onclick="setStatusFilter('want')">☆ Хочу</button>
  </div>
  <div class="divider"></div>
  <select class="sort-select" onchange="setSort(this.value)" id="sort-select">
    <option value="added">По дате добавления</option>
    <option value="title">По алфавиту</option>
    <option value="fav">Любимые первыми</option>
    <option value="status">По статусу</option>
    <option value="year">По году</option>
  </select>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Поиск…" oninput="render()">
  </div>
  <button class="btn-add btn-add-books" id="btn-add" onclick="openModal()">+ Добавить</button>
</div>

<div class="list-wrap" id="list"></div>

<div class="footer-actions">
  <button class="btn-io" onclick="exportJSON()">⬇ JSON</button>
  <button class="btn-io" onclick="exportCSV()">⬇ CSV</button>
  <button class="btn-io" onclick="document.getElementById('import-input').click()">⬆ Импорт</button>
  <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
  <button class="btn-io btn-myshows" onclick="syncMyShows()" id="btn-myshows">⟳ MyShows</button>
  <span id="sync-status" style="font-size:11px;color:var(--ink-soft);align-self:center;"></span>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="closeOnBackdrop(event)">
  <div class="modal" id="modal-box">
    <h2 id="modal-title">Добавить книгу</h2>
    <label>Название</label>
    <input type="text" id="f-title" placeholder="Название…">
    <label>Автор / Режиссёр</label>
    <input type="text" id="f-author" placeholder="Автор…">
    <label>Год</label>
    <input type="number" id="f-year" placeholder="2024" min="1800" max="2099">
    <label id="f-genre-label">Жанр</label>
    <input type="text" id="f-genre" placeholder="Роман, Документальный…">
    <label>Статус</label>
    <select id="f-status">
      <option value="want">☆ Хочу</option>
      <option value="reading">⚡ Читаю / Смотрю</option>
      <option value="read">✓ Прочитано / Просмотрено</option>
    </select>
    <label>Заметка (необязательно)</label>
    <input type="text" id="f-note" placeholder="Коротко о впечатлении…">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save btn-save-books" id="btn-save" onclick="saveItem()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let items = JSON.parse(localStorage.getItem('mylib_v2') || '[]');
let currentTab = 'books';   // books | films | all | fav
let statusFilter = 'all';
let sortMode = 'added';
let editingId = null;

const STATUS_ORDER = { reading: 0, read: 1, want: 2 };

function save() {
  localStorage.setItem('mylib_v2', JSON.stringify(items));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  statusFilter = 'all';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on-books','on-films'));
  document.querySelector('[data-filter="all"]').classList.add(tab === 'films' ? 'on-films' : 'on-books');

  // update add button
  const btn = document.getElementById('btn-add');
  if (tab === 'films') {
    btn.className = 'btn-add btn-add-films';
    btn.textContent = '+ Добавить';
  } else {
    btn.className = 'btn-add btn-add-books';
    btn.textContent = '+ Добавить';
  }

  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  const activeClass = (tab === 'films') ? 'active-films' : 'active-books';
  document.getElementById('tab-' + tab).classList.add(activeClass);

  render();
}

// ── FILTERS ──
function setStatusFilter(f) {
  statusFilter = f;
  const isFilms = currentTab === 'films';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on-books','on-films'));
  const btn = document.querySelector(`[data-filter="${f}"]`);
  if (btn) btn.classList.add(isFilms ? 'on-films' : 'on-books');
  render();
}

function setSort(v) {
  sortMode = v;
  render();
}

// ── FILTERING LOGIC ──
function getFiltered() {
  let list = [...items];

  // tab filter
  if (currentTab === 'books') list = list.filter(i => i.type === 'book');
  else if (currentTab === 'films') list = list.filter(i => i.type === 'film');
  else if (currentTab === 'fav') list = list.filter(i => i.fav);

  // status filter
  if (statusFilter !== 'all') list = list.filter(i => i.status === statusFilter);

  // search
  const q = document.getElementById('search')?.value?.toLowerCase().trim();
  if (q) list = list.filter(i =>
    i.title.toLowerCase().includes(q) ||
    (i.author||'').toLowerCase().includes(q) ||
    (i.genre||'').toLowerCase().includes(q)
  );

  // sort
  if (sortMode === 'title') list.sort((a,b) => a.title.localeCompare(b.title, 'ru'));
  else if (sortMode === 'fav') list.sort((a,b) => (b.fav?1:0)-(a.fav?1:0));
  else if (sortMode === 'status') list.sort((a,b) => (STATUS_ORDER[a.status]??9)-(STATUS_ORDER[b.status]??9));
  else if (sortMode === 'year') list.sort((a,b) => (b.year||0)-(a.year||0));
  else list.sort((a,b) => b.addedAt - a.addedAt); // added desc

  return list;
}

// ── RENDER ──
function render() {
  updateStats();
  const container = document.getElementById('list');
  const list = getFiltered();

  if (!list.length) {
    container.innerHTML = '<div class="empty">Пока ничего нет — добавь первое!</div>';
    return;
  }

  // group by type only when tab = all
  if (currentTab === 'all' || currentTab === 'fav') {
    const books = list.filter(i => i.type === 'book');
    const films = list.filter(i => i.type === 'film');
    let html = '';
    if (books.length) {
      html += `<div class="section-label">Книги (${books.length})</div>`;
      html += books.map(renderItem).join('');
    }
    if (films.length) {
      html += `<div class="section-label">Фильмы и сериалы (${films.length})</div>`;
      html += films.map(renderItem).join('');
    }
    container.innerHTML = html;
  } else {
    container.innerHTML = list.map(renderItem).join('');
  }
}

function renderItem(item) {
  const statusClass = { read: 'status-read', reading: 'status-reading', want: 'status-want' }[item.status] || 'status-want';
  const statusLabel = { read: 'Прочитано / Просмотрено', reading: 'Читаю / Смотрю', want: 'Хочу' }[item.status];
  const nextStatus = { want: 'reading', reading: 'read', read: 'want' }[item.status];
  const doneClass = item.status === 'read' ? ' done' : '';
  const favClass = item.fav ? ' on' : '';
  const genreClass = item.type === 'film' ? 'genre-films' : 'genre-books';
  const meta = [item.author, item.year].filter(Boolean).join(' · ');

  return `<div class="item" id="item-${item.id}">
    <div class="status-wrap">
      <div class="status-dot ${statusClass}" onclick="cycleStatus('${item.id}')" title="${statusLabel}"></div>
      <div class="tip">${statusLabel} → клик: ${nextStatus === 'reading' ? 'Читаю' : nextStatus === 'read' ? 'Прочитано' : 'Хочу'}</div>
    </div>
    <span class="item-title${doneClass}" ondblclick="openEdit('${item.id}')" title="Двойной клик — редактировать">${escHtml(item.title)}</span>
    ${item.genre ? `<span class="item-genre ${genreClass}">${escHtml(item.genre)}</span>` : ''}
    ${meta ? `<span class="item-meta">${escHtml(meta)}</span>` : ''}
    <button class="item-fav${favClass}" onclick="toggleFav('${item.id}')" title="Любимое">♥</button>
    <button class="item-del" onclick="deleteItem('${item.id}')" title="Удалить">×</button>
  </div>`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── STATS ──
function updateStats() {
  const books = items.filter(i => i.type === 'book');
  const films = items.filter(i => i.type === 'film');
  const bRead = books.filter(i => i.status === 'read').length;
  const fRead = films.filter(i => i.status === 'read').length;
  document.getElementById('stats').innerHTML = `
    <span class="stat-item"><span class="stat-dot" style="background:var(--accent)"></span>${bRead} / ${books.length} книг</span>
    <span class="stat-item"><span class="stat-dot" style="background:var(--film-accent)"></span>${fRead} / ${films.length} фильмов</span>
    <span class="stat-item"><span class="stat-dot" style="background:#e91e63"></span>${items.filter(i=>i.fav).length} ♥</span>
  `;
}

// ── ACTIONS ──
function cycleStatus(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.status = { want: 'reading', reading: 'read', read: 'want' }[item.status] || 'want';
  save();
  render();
}

function toggleFav(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.fav = !item.fav;
  save();
  render();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  save();
  render();
}

// ── MODAL ──
function openModal(type) {
  editingId = null;
  const t = type || (currentTab === 'films' ? 'film' : 'book');
  document.getElementById('modal-title').textContent = t === 'film' ? 'Добавить фильм / сериал' : 'Добавить книгу';
  document.getElementById('f-author').placeholder = t === 'film' ? 'Режиссёр…' : 'Автор…';
  document.getElementById('f-genre-label').textContent = t === 'film' ? 'Жанр / формат' : 'Жанр';
  document.getElementById('f-genre').placeholder = t === 'film' ? 'Драма, Документальный…' : 'Роман, Нон-фикшн…';
  document.getElementById('btn-save').className = t === 'film' ? 'btn-save btn-save-films' : 'btn-save btn-save-books';
  document.getElementById('modal').dataset.type = t;
  ['f-title','f-author','f-year','f-genre','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'want';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function openEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  const t = item.type;
  document.getElementById('modal-title').textContent = t === 'film' ? 'Редактировать фильм' : 'Редактировать книгу';
  document.getElementById('f-author').placeholder = t === 'film' ? 'Режиссёр…' : 'Автор…';
  document.getElementById('btn-save').className = t === 'film' ? 'btn-save btn-save-films' : 'btn-save btn-save-books';
  document.getElementById('modal').dataset.type = t;
  document.getElementById('f-title').value = item.title || '';
  document.getElementById('f-author').value = item.author || '';
  document.getElementById('f-year').value = item.year || '';
  document.getElementById('f-genre').value = item.genre || '';
  document.getElementById('f-note').value = item.note || '';
  document.getElementById('f-status').value = item.status || 'want';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingId = null;
}

function closeOnBackdrop(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function saveItem() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const type = document.getElementById('modal').dataset.type || 'book';

  if (editingId) {
    const item = items.find(i => i.id === editingId);
    if (item) {
      item.title = title;
      item.author = document.getElementById('f-author').value.trim();
      item.year = document.getElementById('f-year').value ? parseInt(document.getElementById('f-year').value) : null;
      item.genre = document.getElementById('f-genre').value.trim();
      item.note = document.getElementById('f-note').value.trim();
      item.status = document.getElementById('f-status').value;
    }
  } else {
    items.unshift({
      id: uid(),
      type,
      title,
      author: document.getElementById('f-author').value.trim(),
      year: document.getElementById('f-year').value ? parseInt(document.getElementById('f-year').value) : null,
      genre: document.getElementById('f-genre').value.trim(),
      note: document.getElementById('f-note').value.trim(),
      status: document.getElementById('f-status').value,
      fav: false,
      addedAt: Date.now()
    });
  }

  save();
  closeModal();
  render();
}

// ── EXPORT / IMPORT ──
function exportJSON() {
  const blob = new Blob([JSON.stringify(items, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'library-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function exportCSV() {
  const rows = [['Тип','Название','Автор/Режиссёр','Год','Жанр','Статус','Любимое','Заметка']];
  items.forEach(i => rows.push([
    i.type === 'film' ? 'Фильм' : 'Книга',
    i.title, i.author||'', i.year||'', i.genre||'',
    {read:'Прочитано',reading:'Читаю',want:'Хочу'}[i.status]||'',
    i.fav ? '♥' : '', i.note||''
  ]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'library-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        const existing = new Set(items.map(i => i.id));
        let added = 0;
        data.forEach(item => {
          if (!existing.has(item.id)) { items.push(item); added++; }
        });
        save(); render();
        alert(`Импортировано: ${added} новых записей.`);
      }
    } catch { alert('Ошибка: не удалось прочитать файл.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── MYSHOWS SYNC ──
const MYSHOWS_LOGIN = 'Juliminsk';

// MyShows watchStatus → наш статус
const MS_STATUS_MAP = {
  'watching':   'reading',
  'later':      'want',
  'watched':    'read',
  'cancelled':  'want',
  'refused':    'want'
};

async function syncMyShows() {
  const btn = document.getElementById('btn-myshows');
  const status = document.getElementById('sync-status');
  btn.disabled = true;
  status.textContent = 'Загружаю…';

  try {
    const response = await fetch('https://api.myshows.me/v2/rpc/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jsonrpc: '2.0',
        method: 'profile.Shows',
        params: { login: MYSHOWS_LOGIN },
        id: 1
      })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();

    if (data.error) throw new Error(data.error.message || 'API error');

    const shows = data.result;
    if (!shows || typeof shows !== 'object') throw new Error('Нет данных');

    // shows — объект { showId: { watchStatus, show: { title, ruTitle, year, genres } } }
    const entries = Object.values(shows);
    let added = 0, updated = 0;

    entries.forEach(entry => {
      const show = entry.show || {};
      const title = show.ruTitle || show.title || 'Без названия';
      const year = show.year || null;
      const genre = (show.genres && show.genres[0]) ? show.genres[0] : '';
      const status = MS_STATUS_MAP[entry.watchStatus] || 'want';
      const msId = 'ms_' + (show.id || Math.random().toString(36).slice(2));

      // ищем по myshowsId или по названию
      const existing = items.find(i => i.myshowsId === msId || (i.type === 'film' && i.title === title));
      if (existing) {
        existing.status = status;
        existing.myshowsId = msId;
        updated++;
      } else {
        items.unshift({
          id: uid(),
          myshowsId: msId,
          type: 'film',
          title,
          author: '',
          year,
          genre,
          note: '',
          status,
          fav: false,
          addedAt: Date.now()
        });
        added++;
      }
    });

    save();
    render();
    status.textContent = `✓ ${added} добавлено, ${updated} обновлено`;
    setTimeout(() => status.textContent = '', 4000);

  } catch (err) {
    if (err.message.includes('CORS') || err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
      status.textContent = '';
      showCorsInstructions();
    } else {
      status.textContent = '✗ ' + err.message;
    }
  } finally {
    btn.disabled = false;
  }
}

function showCorsInstructions() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px';
  overlay.innerHTML = `
    <div style="background:var(--paper);border-radius:12px;padding:28px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
      <div style="font-family:'Literata',serif;font-size:17px;margin-bottom:12px">Нужен ручной шаг</div>
      <p style="font-size:13px;color:var(--ink-mid);line-height:1.6;margin-bottom:16px">
        Браузер блокирует прямые запросы к MyShows API (CORS). Это стандартная защита — обойти нельзя.<br><br>
        Открой эту ссылку, скопируй весь JSON и вставь ниже:
      </p>
      <a href="https://api.myshows.me/v2/rpc/?smd=profile.Shows(%7B%22params%22:%7B%22login%22:%22${MYSHOWS_LOGIN}%22%7D%7D)"
         target="_blank"
         style="display:block;font-size:11px;color:var(--accent);word-break:break-all;margin-bottom:16px;text-decoration:underline">
        api.myshows.me → profile.Shows
      </a>
      <p style="font-size:11px;color:var(--ink-soft);margin-bottom:8px">Или попробуй POST через curl / Postman и вставь результат:</p>
      <textarea id="ms-paste" rows="5" style="width:100%;padding:8px;border:1px solid var(--rule);border-radius:8px;font-size:12px;font-family:monospace;resize:vertical;background:var(--paper);color:var(--ink)" placeholder='{"result": {...}}  или  {"id":1,"showId":{...}}'></textarea>
      <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
        <button onclick="this.closest('div[style]').remove()" style="padding:8px 16px;border:1px solid var(--rule);border-radius:8px;background:none;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif">Отмена</button>
        <button onclick="parsePastedMyShows()" style="padding:8px 18px;border:none;border-radius:8px;background:var(--film-accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;font-family:'Inter',sans-serif">Импортировать</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function parsePastedMyShows() {
  const raw = document.getElementById('ms-paste')?.value?.trim();
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    // поддержка разных форматов ответа
    const shows = data.result || data;
    if (typeof shows !== 'object') throw new Error('Неожиданный формат');

    const entries = Array.isArray(shows) ? shows : Object.values(shows);
    let added = 0, updated = 0;

    entries.forEach(entry => {
      const show = entry.show || entry;
      const title = show.ruTitle || show.title || entry.ruTitle || entry.title || 'Без названия';
      const year = show.year || entry.year || null;
      const genre = (show.genres && show.genres[0]) ? show.genres[0] :
                    (entry.genres && entry.genres[0]) ? entry.genres[0] : '';
      const watchStatus = entry.watchStatus || 'later';
      const status = MS_STATUS_MAP[watchStatus] || 'want';
      const msId = 'ms_' + (show.id || entry.id || Math.random().toString(36).slice(2));

      const existing = items.find(i => i.myshowsId === msId || (i.type === 'film' && i.title === title));
      if (existing) {
        existing.status = status;
        existing.myshowsId = msId;
        updated++;
      } else {
        items.unshift({
          id: uid(), myshowsId: msId, type: 'film',
          title, author: '', year, genre, note: '',
          status, fav: false, addedAt: Date.now()
        });
        added++;
      }
    });

    save(); render();
    document.querySelector('div[style*="position:fixed"]')?.remove();
    const s = document.getElementById('sync-status');
    s.textContent = `✓ ${added} добавлено, ${updated} обновлено`;
    setTimeout(() => s.textContent = '', 4000);
  } catch (e) {
    alert('Не удалось разобрать JSON: ' + e.message);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal').style.display !== 'none') {
    e.preventDefault(); saveItem();
  }
});
